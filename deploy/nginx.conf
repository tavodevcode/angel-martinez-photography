server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compresión para texto (imágenes/fuentes ya vienen comprimidas).
  gzip on;
  gzip_comp_level 6;
  gzip_types text/css application/javascript application/json image/svg+xml text/plain;
  gzip_vary on;

  # URL desconocida → página 404 real de Astro (no fallback a la home:
  # esto es un sitio estático multi-página, no una SPA).
  error_page 404 /404.html;

  # Assets con hash en el nombre: cache inmutable de un año.
  location /_astro/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Estáticos de public/ (favicon, etc.): cache moderado, sin immutable
  # porque sus nombres no cambian entre deploys.
  location ~* \.(?:ico|svg|png|jpg|jpeg|webp|avif|woff2|txt|xml)$ {
    add_header Cache-Control "public, max-age=86400";
  }

  # Páginas HTML: siempre revalidar para que un deploy nuevo se vea al instante.
  location / {
    try_files $uri $uri/ =404;
    add_header Cache-Control "no-cache";
  }
}
